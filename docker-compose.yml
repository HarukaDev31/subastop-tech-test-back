version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swapi_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-swapi_db}
      - DB_USERNAME=${DB_USERNAME:-swapi_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=phpredis
      - CACHE_STORE=redis
      - CACHE_DRIVER=redis
      - API_KEY=${API_KEY:-changeme}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swapi_net

  nginx:
    image: nginx:alpine
    container_name: swapi_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - swapi_net

  db:
    image: mysql:8.0
    container_name: swapi_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-swapi_db}
      MYSQL_USER: ${DB_USERNAME:-swapi_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3307:3306"
    volumes:
      - swapi_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swapi_net

  redis:
    image: redis:7-alpine
    container_name: swapi_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - swapi_net

volumes:
  swapi_db_data:

networks:
  swapi_net:
    driver: bridge
